<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b1220;
      --card: rgba(255,255,255,0.06);
      --text: #e5e7eb;
      --accent: #38bdf8;
      --glass: rgba(255,255,255,0.08);
    }

    [data-theme="light"] {
      --bg: #f9fafb;
      --card: rgba(0,0,0,0.05);
      --text: #111827;
      --glass: rgba(255,255,255,0.7);
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

    body { background: var(--bg); color: var(--text); scroll-behavior:smooth; }

    header {
      position: fixed; width:100%; top:0;
      display:flex; justify-content:space-between; align-items:center;
      padding:15px 40px;
      backdrop-filter: blur(12px);
      background: var(--glass);
      z-index:1000;
    }

    nav a { margin:0 10px; text-decoration:none; color:var(--text); }

    .toggle { cursor:pointer; }

    section { padding:100px 20px; max-width:1200px; margin:auto; }

    .hero { text-align:center; }

    .typing { color: var(--accent); font-weight:600; }

    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; }

    .card {
      padding:20px; border-radius:20px;
      background: var(--card);
      backdrop-filter: blur(10px);
      transition:0.4s;
      opacity:0; transform:translateY(40px);
    }

    .card.show { opacity:1; transform:translateY(0); }

    .card:hover {
      transform: translateY(-10px);
      box-shadow:0 10px 40px rgba(0,0,0,0.3);
    }

    img { width:100%; border-radius:10px; }

    .tags span {
      background: var(--accent);
      padding:3px 8px; margin:3px;
      border-radius:5px; font-size:12px;
    }

    form input, form textarea {
      width:100%; padding:10px; margin:10px 0;
      border:none; border-radius:8px;
    }

    button {
      padding:10px 20px; border:none;
      background: var(--accent);
      cursor:pointer; border-radius:20px;
    }

    @media(max-width:600px){ header{padding:10px 20px;} }

  </style>
</head>
<body>

<header>
  <h3>Portfolio</h3>
  <nav>
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
    <span class="toggle" onclick="toggleTheme()">🌓</span>
  </nav>
</header>

<section class="hero">
  <h1>Hi, I'm Developer 🚀</h1>
  <h2 class="typing"></h2>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="grid">

    <div class="card">
      <img src="https://via.placeholder.com/400" />
      <h3>AI SaaS Tool</h3>
      <p>AI agent automation platform</p>
      <div class="tags"><span>AI</span><span>n8n</span></div>
      <a href="#">Live</a> | <a href="#">Code</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/400" />
      <h3>Data Dashboard</h3>
      <p>Analytics dashboard</p>
      <div class="tags"><span>Python</span><span>Charts</span></div>
      <a href="#">Live</a> | <a href="#">Code</a>
    </div>

  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <form>
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
  </form>
</section>

<script>

// Typing Animation
const roles = ["AI Agent Builder", "Data Analyst", "Frontend Developer"];
let i=0,j=0,current='',isDeleting=false;
const typingEl=document.querySelector('.typing');

function type(){
  if(i<roles.length){
    if(!isDeleting && j<=roles[i].length){
      current=roles[i].substring(0,j++);
    } else if(isDeleting && j>=0){
      current=roles[i].substring(0,j--);
    }

    if(j==roles[i].length) isDeleting=true;
    if(j==0){ isDeleting=false; i=(i+1)%roles.length; }

    typingEl.innerHTML=current;
    setTimeout(type,100);
  }
}

// Scroll Animation
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){ entry.target.classList.add('show'); }
  });
});

document.querySelectorAll('.card').forEach(el=>observer.observe(el));

// Theme Toggle
function toggleTheme(){
  document.body.dataset.theme = document.body.dataset.theme==='light'?'dark':'light';
}

// Init
type();

</script>

</body>
</html>
